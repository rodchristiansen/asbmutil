name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.tag.outputs.should_release }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version number
      id: version
      run: |
        export TZ=America/Vancouver
        VERSION=$(date +'%Y.%m.%d.%H%M')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Resolve tag
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          TAG="${{ steps.version.outputs.version }}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
        else
          echo "should_release=false" >> $GITHUB_OUTPUT
          echo "tag_name=" >> $GITHUB_OUTPUT
        fi

  build-macos:
    needs: version
    runs-on: macos-14
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode with Swift 6+
      run: |
        sudo xcode-select -s /Applications/Xcode_16.1.app
        swift --version

    - name: Write Version.swift
      run: |
        cat > Sources/asbmutil/Version.swift << EOF
        // This file is auto-generated during build
        // Do not edit manually - changes will be overwritten

        enum AppVersion {
            static let version = "${{ needs.version.outputs.version }}"
        }
        EOF

    - name: Build binary
      run: swift build -c release

    - name: Verify binary
      run: |
        ls -la .build/release/asbmutil
        .build/release/asbmutil --version
        .build/release/asbmutil --help

    - name: Create release zip
      run: |
        zip -j asbmutil-${{ needs.version.outputs.version }}-macos-arm64.zip .build/release/asbmutil

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: asbmutil-${{ needs.version.outputs.version }}-macos-arm64
        path: asbmutil-${{ needs.version.outputs.version }}-macos-arm64.zip

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Write Version.swift
      run: |
        cat > Sources/asbmutil/Version.swift << EOF
        // This file is auto-generated during build
        // Do not edit manually - changes will be overwritten

        enum AppVersion {
            static let version = "${{ needs.version.outputs.version }}"
        }
        EOF

    - name: Install Static Linux SDK
      run: |
        SWIFT_VERSION=$(swift --version | sed -n 's/.*Swift version \([0-9.]*\).*/\1/p')
        echo "Detected Swift version: ${SWIFT_VERSION}"
        SDK_URL="https://download.swift.org/swift-${SWIFT_VERSION}-release/static-sdk/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz"
        echo "Downloading SDK from: ${SDK_URL}"
        curl -sL -o /tmp/static-linux-sdk.tar.gz "${SDK_URL}"
        swift sdk install /tmp/static-linux-sdk.tar.gz
        swift sdk list

    - name: Build binary
      run: swift build -c release --swift-sdk x86_64-swift-linux-musl

    - name: Verify binary
      run: |
        ls -la .build/release/asbmutil
        file .build/release/asbmutil
        ldd .build/release/asbmutil && echo "WARNING: dynamically linked" || echo "Fully statically linked"
        .build/release/asbmutil --version
        .build/release/asbmutil --help

    - name: Create release archive
      run: |
        tar czf asbmutil-${{ needs.version.outputs.version }}-linux-amd64.tar.gz -C .build/release asbmutil

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: asbmutil-${{ needs.version.outputs.version }}-linux-amd64
        path: asbmutil-${{ needs.version.outputs.version }}-linux-amd64.tar.gz

  release:
    needs: [version, build-macos, build-linux]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate release notes
      id: notes
      run: |
        TAG="${{ needs.version.outputs.tag_name }}"
        LAST_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -n 1 || echo "")

        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s (%h)" -10)
        else
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)")
        fi

        cat > release_notes.md << EOF
        ${COMMITS}
        EOF

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ needs.version.outputs.tag_name }}
        body_path: release_notes.md
        files: |
          artifacts/asbmutil-${{ needs.version.outputs.version }}-macos-arm64/asbmutil-${{ needs.version.outputs.version }}-macos-arm64.zip
          artifacts/asbmutil-${{ needs.version.outputs.version }}-linux-amd64/asbmutil-${{ needs.version.outputs.version }}-linux-amd64.tar.gz